services:
  whisper:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - whisper-models:/models
      - whisper-data:/data
    environment:
      - WHISPER_MODEL=large-v3
      - WHISPER_DEVICE=auto
      - WHISPER_COMPUTE_TYPE=auto
      - DB_PATH=/data/transcriptions.db
      - STORE_AUDIO=false
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped

volumes:
  whisper-models:
  whisper-data:
