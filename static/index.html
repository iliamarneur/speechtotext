<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transcription Audio</title>
    <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/markmap-view@0.18.12/dist/browser/index.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vega@5"></script>
    <script src="https://cdn.jsdelivr.net/npm/vega-lite@5"></script>
    <script src="https://cdn.jsdelivr.net/npm/vega-embed@6"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
        }

        /* Navbar */
        .navbar {
            position: sticky; top: 0; z-index: 100;
            background: #1e293b;
            border-bottom: 1px solid #334155;
            padding: 0 1.5rem;
            display: flex; align-items: center; gap: 1.5rem;
            height: 56px;
        }
        .navbar .logo {
            font-size: 1.1rem; font-weight: 700; color: #f8fafc;
            text-decoration: none; margin-right: 1rem;
        }
        .navbar a {
            color: #94a3b8; text-decoration: none; font-size: 0.9rem;
            padding: 0.4rem 0.8rem; border-radius: 6px; transition: all 0.2s;
        }
        .navbar a:hover, .navbar a.active { color: #e2e8f0; background: #334155; }
        .navbar .spacer { flex: 1; }
        .navbar .search-bar {
            display: flex; align-items: center; gap: 0.5rem;
        }
        .navbar .search-bar input {
            background: #0f172a; border: 1px solid #334155; border-radius: 6px;
            padding: 0.4rem 0.7rem; color: #e2e8f0; font-size: 0.85rem; width: 200px;
        }

        .main { max-width: 1100px; margin: 0 auto; padding: 1.5rem; }

        /* Cards */
        .card {
            background: #1e293b; border: 1px solid #334155;
            border-radius: 12px; padding: 1.5rem; margin-bottom: 1.5rem;
        }

        /* Stat cards */
        .stats-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem; margin-bottom: 1.5rem;
        }
        .stat-card {
            background: #1e293b; border: 1px solid #334155; border-radius: 10px;
            padding: 1.2rem; text-align: center;
        }
        .stat-card .stat-value { font-size: 1.8rem; font-weight: 700; color: #3b82f6; }
        .stat-card .stat-label { font-size: 0.8rem; color: #94a3b8; margin-top: 0.3rem; }

        /* Filters */
        .filters {
            display: flex; gap: 0.8rem; margin-bottom: 1rem; flex-wrap: wrap; align-items: center;
        }
        .filters select, .filters input {
            background: #0f172a; border: 1px solid #334155; border-radius: 8px;
            padding: 0.5rem 0.7rem; color: #e2e8f0; font-size: 0.85rem;
        }
        .filters select { min-width: 130px; }
        .filters input { flex: 1; min-width: 150px; }

        /* Table */
        .table-wrap { overflow-x: auto; }
        table {
            width: 100%; border-collapse: collapse; font-size: 0.85rem;
        }
        th {
            text-align: left; padding: 0.7rem 0.8rem; color: #94a3b8;
            border-bottom: 1px solid #334155; font-weight: 600; white-space: nowrap;
        }
        td {
            padding: 0.7rem 0.8rem; border-bottom: 1px solid #1e293b;
            max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        }
        tr:hover td { background: rgba(59,130,246,0.05); }
        .badge {
            display: inline-block; padding: 0.15rem 0.5rem; border-radius: 999px;
            font-size: 0.75rem; font-weight: 600;
        }
        .badge-completed { background: #14532d; color: #86efac; }
        .badge-processing { background: #1e3a5f; color: #93c5fd; }
        .badge-error { background: #7f1d1d; color: #fca5a5; }
        .badge-pending { background: #334155; color: #94a3b8; }

        /* Pagination */
        .pagination {
            display: flex; justify-content: center; align-items: center;
            gap: 0.5rem; margin-top: 1rem;
        }
        .pagination button {
            padding: 0.4rem 0.8rem; background: #334155; color: #e2e8f0;
            border: none; border-radius: 6px; cursor: pointer; font-size: 0.85rem;
        }
        .pagination button:hover { background: #475569; }
        .pagination button:disabled { opacity: 0.4; cursor: not-allowed; }
        .pagination span { color: #94a3b8; font-size: 0.85rem; }

        /* Buttons */
        .btn {
            padding: 0.6rem 1.2rem; background: #3b82f6; color: #fff;
            border: none; border-radius: 8px; font-size: 0.9rem; font-weight: 600;
            cursor: pointer; transition: background 0.2s; display: inline-flex; align-items: center; gap: 0.4rem;
        }
        .btn:hover { background: #2563eb; }
        .btn:disabled { background: #334155; color: #64748b; cursor: not-allowed; }
        .btn-sm { padding: 0.3rem 0.7rem; font-size: 0.8rem; border-radius: 6px; }
        .btn-secondary { background: #334155; }
        .btn-secondary:hover { background: #475569; }
        .btn-success { background: #16a34a; }
        .btn-success:hover { background: #15803d; }

        label { display: block; font-weight: 600; margin-bottom: 0.5rem; font-size: 0.9rem; color: #cbd5e1; }

        /* Drop zone */
        .drop-zone {
            border: 2px dashed #475569; border-radius: 10px; padding: 2rem;
            text-align: center; cursor: pointer; transition: all 0.2s; margin-bottom: 1rem;
        }
        .drop-zone:hover, .drop-zone.dragover { border-color: #3b82f6; background: rgba(59,130,246,0.05); }
        .drop-zone p { color: #94a3b8; }
        .drop-zone .icon { font-size: 2rem; margin-bottom: 0.5rem; }
        .file-name { margin-top: 0.5rem; color: #3b82f6; font-weight: 600; word-break: break-all; }

        select.full {
            width: 100%; padding: 0.6rem 0.8rem; background: #0f172a;
            border: 1px solid #334155; border-radius: 8px; color: #e2e8f0;
            font-size: 0.95rem; margin-bottom: 1rem;
        }

        /* Progress */
        .progress-container { display: none; margin-top: 1.2rem; }
        .progress-container.active { display: block; }
        .progress-header { display: flex; justify-content: space-between; margin-bottom: 0.5rem; font-size: 0.85rem; }
        .progress-label { color: #94a3b8; }
        .progress-percent { color: #3b82f6; font-weight: 700; font-size: 1rem; }
        .progress-bar-track {
            width: 100%; height: 12px; background: #0f172a;
            border-radius: 6px; overflow: hidden; border: 1px solid #334155;
        }
        .progress-bar-fill {
            height: 100%; width: 0%; background: linear-gradient(90deg, #3b82f6, #8b5cf6);
            border-radius: 6px; transition: width 0.3s ease; position: relative;
        }
        .progress-bar-fill::after {
            content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
            animation: shimmer 1.5s ease-in-out infinite;
        }
        @keyframes shimmer { 0%{transform:translateX(-100%)} 100%{transform:translateX(100%)} }
        .progress-detail { margin-top: 0.5rem; font-size: 0.8rem; color: #64748b; }
        .progress-live-text {
            margin-top: 0.8rem; background: #0f172a; border: 1px solid #334155;
            border-radius: 8px; padding: 0.8rem; font-size: 0.85rem; color: #94a3b8;
            max-height: 120px; overflow-y: auto; line-height: 1.5; font-style: italic;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Status banner */
        .status-banner {
            padding: 0.8rem 1rem; border-radius: 10px; margin-bottom: 1.5rem;
            font-size: 0.9rem; display: flex; align-items: center; gap: 0.6rem;
        }
        .status-banner.loading { background: #1e3a5f; border: 1px solid #2563eb; color: #93c5fd; }
        .status-banner.ready { background: #14532d; border: 1px solid #16a34a; color: #86efac; }
        .status-spinner {
            display: inline-block; width: 16px; height: 16px;
            border: 2px solid #334155; border-top-color: #3b82f6;
            border-radius: 50%; animation: spin 0.8s linear infinite; flex-shrink: 0;
        }
        .status-dot { width: 10px; height: 10px; background: #22c55e; border-radius: 50%; flex-shrink: 0; }

        /* Result */
        .result { display: none; }
        .result.active { display: block; }
        textarea.result-text {
            width: 100%; min-height: 200px; background: #0f172a;
            border: 1px solid #334155; border-radius: 8px; color: #e2e8f0;
            padding: 1rem; font-size: 0.95rem; line-height: 1.6; resize: vertical; font-family: inherit;
        }
        .error-msg {
            display: none; background: #7f1d1d; border: 1px solid #991b1b;
            color: #fca5a5; padding: 1rem; border-radius: 8px; margin-top: 1rem;
        }
        .error-msg.active { display: block; }

        /* Detail view */
        .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
        @media (max-width: 768px) { .detail-grid { grid-template-columns: 1fr; } }
        .meta-table { width: 100%; font-size: 0.85rem; }
        .meta-table td { padding: 0.4rem 0.5rem; border-bottom: 1px solid #334155; }
        .meta-table td:first-child { color: #94a3b8; font-weight: 600; width: 45%; }

        /* Segments list */
        .segments-list {
            max-height: 500px; overflow-y: auto; font-size: 0.85rem;
        }
        .segment-item {
            padding: 0.6rem 0.8rem; border-bottom: 1px solid #1e293b;
            cursor: pointer; transition: background 0.15s; display: flex; gap: 0.5rem;
        }
        .segment-item:hover { background: rgba(59,130,246,0.08); }
        .seg-time { color: #3b82f6; font-weight: 600; white-space: nowrap; min-width: 100px; }
        .seg-text { flex: 1; }
        .seg-text[contenteditable="true"] { outline: 1px solid #3b82f6; border-radius: 4px; padding: 2px 4px; }

        /* Export buttons */
        .export-btns { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-top: 1rem; }

        /* Quality stars */
        .stars { display: inline-flex; gap: 0.2rem; cursor: pointer; }
        .stars span { font-size: 1.3rem; color: #475569; transition: color 0.15s; }
        .stars span.active { color: #eab308; }
        .stars span:hover { color: #facc15; }

        /* Notes */
        textarea.notes-input {
            width: 100%; min-height: 60px; background: #0f172a;
            border: 1px solid #334155; border-radius: 8px; color: #e2e8f0;
            padding: 0.6rem; font-size: 0.85rem; resize: vertical; font-family: inherit;
            margin-top: 0.5rem;
        }

        /* Search results */
        .search-result {
            padding: 1rem; border-bottom: 1px solid #334155; cursor: pointer;
            transition: background 0.15s;
        }
        .search-result:hover { background: rgba(59,130,246,0.05); }
        .search-result .sr-file { font-weight: 600; color: #e2e8f0; }
        .search-result .sr-time { color: #3b82f6; font-size: 0.8rem; margin: 0.2rem 0; }
        .search-result .sr-text { color: #94a3b8; font-size: 0.9rem; }

        /* Audio player */
        audio { width: 100%; margin: 0.8rem 0; border-radius: 8px; }

        .empty-state {
            text-align: center; padding: 3rem 1rem; color: #64748b;
        }
        .empty-state .icon { font-size: 3rem; margin-bottom: 1rem; }
        .link { color: #3b82f6; cursor: pointer; text-decoration: none; }
        .link:hover { text-decoration: underline; }

        .mb-1 { margin-bottom: 0.5rem; }
        .mb-2 { margin-bottom: 1rem; }
        .mt-1 { margin-top: 0.5rem; }
        .mt-2 { margin-top: 1rem; }

        /* Summary / Analysis */
        .summary-card { margin-top: 1.5rem; }
        .summary-content {
            background: #0f172a; border: 1px solid #334155; border-radius: 8px;
            padding: 1rem; font-size: 0.9rem; line-height: 1.6;
            color: #cbd5e1; white-space: pre-wrap; min-height: 60px;
            max-height: 500px; overflow-y: auto;
        }
        .summary-content h1, .summary-content h2, .summary-content h3 {
            color: #f8fafc; margin: 0.8rem 0 0.4rem 0;
        }
        .summary-content h1 { font-size: 1.2rem; }
        .summary-content h2 { font-size: 1.05rem; }
        .summary-content h3 { font-size: 0.95rem; }
        .summary-content ul { padding-left: 1.5rem; margin: 0.4rem 0; }
        .summary-content li { margin: 0.2rem 0; }
        .summary-content strong { color: #e2e8f0; }
        .summary-actions { display: flex; gap: 0.5rem; align-items: center; margin-bottom: 0.8rem; flex-wrap: wrap; }
        .llm-badge {
            display: inline-block; padding: 0.15rem 0.5rem; border-radius: 999px;
            font-size: 0.7rem; font-weight: 600; background: #1e3a5f; color: #93c5fd;
        }
        .summary-status { font-size: 0.8rem; color: #64748b; }
        .btn-ai { background: linear-gradient(135deg, #7c3aed, #3b82f6); }
        .btn-ai:hover { opacity: 0.9; }

        /* Analysis tabs — pill style */
        .analysis-tabs-container { margin-top: 1.5rem; }
        .analysis-tabs-container.result { display: none; }
        .analysis-tabs-container.result.active { display: block; }
        .analysis-tabs {
            display: flex; gap: 0.5rem; padding: 0.4rem;
            background: #0f172a; border-radius: 12px; border: 1px solid #334155;
            overflow-x: auto; scrollbar-width: none;
        }
        .analysis-tabs::-webkit-scrollbar { display: none; }
        .analysis-tab {
            padding: 0.55rem 1rem; font-size: 0.8rem; font-weight: 600;
            color: #94a3b8; cursor: pointer; white-space: nowrap;
            border: none; border-radius: 8px; background: transparent;
            transition: all 0.25s ease; display: flex; align-items: center; gap: 0.45rem;
            position: relative;
        }
        .analysis-tab:hover { color: #e2e8f0; background: rgba(59,130,246,0.08); }
        .analysis-tab.active {
            color: #fff; background: linear-gradient(135deg, #3b82f6, #7c3aed);
            box-shadow: 0 2px 8px rgba(59,130,246,0.3);
        }
        .analysis-tab .tab-icon { font-size: 0.95rem; line-height: 1; }
        .analysis-tab .tab-dot {
            width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0;
            position: absolute; top: 6px; right: 6px;
        }
        .analysis-tab .tab-dot.idle { background: transparent; }
        .analysis-tab .tab-dot.loading { background: #eab308; animation: pulse-dot 1s ease-in-out infinite; }
        .analysis-tab .tab-dot.done { background: #22c55e; }
        @keyframes pulse-dot { 0%,100%{opacity:1} 50%{opacity:0.3} }
        .analysis-panel {
            display: none; padding-top: 1.2rem;
        }
        .analysis-panel.active { display: block; animation: fadePanel 0.2s ease; }
        @keyframes fadePanel { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:translateY(0)} }
        .analysis-panel-header {
            display: flex; justify-content: space-between; align-items: center;
            flex-wrap: wrap; gap: 0.5rem; margin-bottom: 0.8rem;
        }
        .analysis-panel-header .left { display: flex; align-items: center; gap: 0.8rem; }
        .analysis-panel-header .right { display: flex; align-items: center; gap: 0.5rem; }
        .mindmap-wrap {
            background: #ffffff; border-radius: 8px; border: 1px solid #334155;
            position: relative; overflow: hidden;
        }
        .mindmap-wrap svg { width: 100%; height: 450px; display: block; }
        .mindmap-wrap .markmap-node text { fill: #1e293b; font-size: 14px; font-weight: 500; }
        .mindmap-wrap .markmap-node circle { stroke-width: 2px; }

        /* Slides viewer */
        .slides-viewer {
            background: #0f172a; border: 1px solid #334155; border-radius: 8px;
            overflow: hidden;
        }
        .slide-display {
            background: linear-gradient(135deg, #1e293b, #0f172a);
            min-height: 300px; padding: 2rem 2.5rem;
            display: flex; flex-direction: column; justify-content: center;
        }
        .slide-display h1 { font-size: 1.5rem; color: #f8fafc; margin-bottom: 0.5rem; }
        .slide-display h2 { font-size: 1.15rem; color: #3b82f6; margin-bottom: 0.8rem; }
        .slide-display h3 { font-size: 1rem; color: #8b5cf6; margin-bottom: 0.6rem; }
        .slide-display p { color: #cbd5e1; line-height: 1.6; margin-bottom: 0.4rem; }
        .slide-display ul { padding-left: 1.5rem; color: #cbd5e1; }
        .slide-display li { margin: 0.3rem 0; line-height: 1.5; }
        .slide-display strong { color: #f8fafc; }
        .slides-nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 0.6rem 1rem; background: #1e293b; border-top: 1px solid #334155;
        }
        .slides-nav button {
            padding: 0.35rem 0.8rem; background: #334155; color: #e2e8f0;
            border: none; border-radius: 6px; cursor: pointer; font-size: 0.8rem;
        }
        .slides-nav button:hover { background: #475569; }
        .slides-nav button:disabled { opacity: 0.3; cursor: not-allowed; }
        .slides-nav .slide-counter { color: #94a3b8; font-size: 0.8rem; }

        /* Infographic / Vega-Lite */
        .vega-wrap {
            background: #ffffff; border-radius: 8px; border: 1px solid #334155;
            padding: 1rem; overflow: hidden;
        }
        .vega-wrap .vega-embed { width: 100%; }
        .vega-wrap .vega-embed details { display: none; }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="#/" class="logo">Transcription Audio</a>
        <a href="#/" data-nav="dashboard">Dashboard</a>
        <a href="#/upload" data-nav="upload">Transcrire</a>
        <span class="spacer"></span>
        <div class="search-bar">
            <input type="text" id="navSearch" placeholder="Rechercher..." />
        </div>
    </nav>

    <div class="main" id="app"></div>

    <script>
    // --- SPA Router ---
    const app = document.getElementById('app');
    let currentRoute = '';

    function navigate(hash) {
        if (!hash || hash === '#') hash = '#/upload';
        window.location.hash = hash;
    }

    window.addEventListener('hashchange', () => handleRoute());
    window.addEventListener('load', () => handleRoute());

    function handleRoute() {
        const hash = window.location.hash || '#/upload';
        const [path, qs] = hash.slice(1).split('?');
        const params = new URLSearchParams(qs || '');

        // Update navbar active state
        document.querySelectorAll('.navbar a[data-nav]').forEach(a => {
            a.classList.toggle('active',
                (a.dataset.nav === 'dashboard' && (path === '/' || path === '')) ||
                (a.dataset.nav === 'upload' && path === '/upload')
            );
        });

        if (path === '/' || path === '') {
            renderDashboard(app);
        } else if (path === '/upload') {
            renderUpload(app);
        } else if (path.match(/^\/transcriptions\/(\d+)$/)) {
            const id = path.match(/^\/transcriptions\/(\d+)$/)[1];
            renderDetail(app, id);
        } else if (path === '/search') {
            renderSearch(app, params.get('q') || '');
        } else {
            renderDashboard(app);
        }
    }

    // --- Navbar search ---
    document.getElementById('navSearch').addEventListener('keydown', e => {
        if (e.key === 'Enter' && e.target.value.trim()) {
            navigate('#/search?q=' + encodeURIComponent(e.target.value.trim()));
        }
    });

    // --- API helpers ---
    async function api(url, options = {}) {
        const resp = await fetch(url, options);
        if (!resp.ok) {
            const err = await resp.json().catch(() => ({ detail: resp.statusText }));
            throw new Error(err.detail || resp.statusText);
        }
        return resp.json();
    }

    function formatTime(s) {
        const m = Math.floor(s / 60);
        const sec = Math.floor(s % 60);
        return m.toString().padStart(2,'0') + ':' + sec.toString().padStart(2,'0');
    }

    function formatMs(ms) {
        if (!ms) return '-';
        if (ms < 1000) return ms + 'ms';
        return (ms / 1000).toFixed(1) + 's';
    }

    function formatDuration(sec) {
        if (!sec) return '-';
        const h = Math.floor(sec / 3600);
        const m = Math.floor((sec % 3600) / 60);
        const s = Math.floor(sec % 60);
        if (h > 0) return h + 'h ' + m + 'min';
        if (m > 0) return m + 'min ' + s + 's';
        return s + 's';
    }

    function formatDate(d) {
        if (!d) return '-';
        try {
            const date = new Date(d + 'Z');
            return date.toLocaleDateString('fr-FR', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit' });
        } catch { return d; }
    }

    function escHtml(t) {
        if (!t) return '';
        return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function badgeClass(status) {
        return 'badge badge-' + (status || 'pending');
    }

    function markdownToHtml(md) {
        if (!md) return '';
        let html = escHtml(md);
        // Headers
        html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
        html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
        html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');
        // Bold and italic
        html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
        html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
        // Bullet lists
        html = html.replace(/^- (.+)$/gm, '<li>$1</li>');
        html = html.replace(/(<li>.*<\/li>\n?)+/g, '<ul>$&</ul>');
        // Numbered lists
        html = html.replace(/^\d+\. (.+)$/gm, '<li>$1</li>');
        // Line breaks
        html = html.replace(/\n\n/g, '<br><br>');
        html = html.replace(/\n/g, '<br>');
        // Clean up
        html = html.replace(/<br><\/ul>/g, '</ul>');
        html = html.replace(/<ul><br>/g, '<ul>');
        return html;
    }

    // Parse Markdown headings/bullets into markmap tree structure
    function mdToMarkmapTree(md) {
        const lines = md.split('\n').filter(l => l.trim());
        const root = { content: '', children: [], depth: 0 };
        const stack = [root];

        for (const line of lines) {
            let node = null;
            const hMatch = line.match(/^(#{1,6})\s+(.+)$/);
            const bMatch = line.match(/^(\s*)-\s+(.+)$/);

            if (hMatch) {
                const depth = hMatch[1].length;
                node = { content: hMatch[2].trim(), children: [], depth };
            } else if (bMatch) {
                const indent = bMatch[1].length;
                const depth = 7 + Math.floor(indent / 2);
                node = { content: bMatch[2].trim(), children: [], depth };
            }

            if (node) {
                while (stack.length > 1 && stack[stack.length - 1].depth >= node.depth) {
                    stack.pop();
                }
                stack[stack.length - 1].children.push(node);
                stack.push(node);
            }
        }

        return root.children.length === 1 ? root.children[0] : root.children.length ? { content: 'Carte mentale', children: root.children, depth: 0 } : { content: 'Vide', children: [], depth: 0 };
    }

    function renderMarkmapSvg(svgEl, md) {
        if (!md || typeof markmap === 'undefined') return false;
        try {
            const tree = mdToMarkmapTree(md);
            svgEl.innerHTML = '';
            markmap.Markmap.create(svgEl, {
                maxWidth: 280,
                colorFreezeLevel: 2,
                color: (node) => {
                    const colors = ['#3b82f6','#8b5cf6','#ec4899','#f59e0b','#10b981','#ef4444','#06b6d4','#84cc16'];
                    const idx = node.state?.path ? (node.state.path.split('.')[1] || 0) : 0;
                    return colors[idx % colors.length];
                },
            }, tree);
            return true;
        } catch(e) { console.warn('Markmap render error:', e); return false; }
    }

    // Slides viewer helper
    function createSlideViewer(md, displayEl, counterEl, prevBtn, nextBtn, viewerEl, contentEl) {
        const slides = md.split(/\n---\n/).map(s => s.trim()).filter(Boolean);
        if (!slides.length) return;
        let current = 0;

        function showSlide(i) {
            current = Math.max(0, Math.min(i, slides.length - 1));
            displayEl.innerHTML = markdownToHtml(slides[current]);
            counterEl.textContent = (current + 1) + ' / ' + slides.length;
            prevBtn.disabled = current === 0;
            nextBtn.disabled = current === slides.length - 1;
        }

        prevBtn.onclick = () => showSlide(current - 1);
        nextBtn.onclick = () => showSlide(current + 1);
        viewerEl.style.display = 'block';
        if (contentEl) contentEl.style.display = 'none';
        showSlide(0);
    }

    function renderVegaLite(wrapEl, jsonStr, contentEl) {
        try {
            // Extract JSON from potential markdown code fences
            let clean = jsonStr.trim();
            const fenceMatch = clean.match(/```(?:json)?\s*([\s\S]*?)```/);
            if (fenceMatch) clean = fenceMatch[1].trim();
            const spec = JSON.parse(clean);
            wrapEl.innerHTML = '';
            wrapEl.style.display = 'block';
            if (contentEl) contentEl.style.display = 'none';
            vegaEmbed(wrapEl, spec, { actions: false, renderer: 'svg' }).catch(() => {
                wrapEl.style.display = 'none';
                if (contentEl) contentEl.style.display = 'block';
            });
        } catch (e) {
            // JSON invalid — show raw text
            wrapEl.style.display = 'none';
            if (contentEl) contentEl.style.display = 'block';
        }
    }

                            a.badge.textContent = '';
                            a.status.textContent = '';
                            a.content.innerHTML = '<span style="color:#64748b;">' + a.msg + '</span>';
                            const dot = document.getElementById(a.dot);

                            document.querySelectorAll('#analysisContainer .analysis-panel').forEach(p => p.classList.remove('active'));

                            const tMap = {
                                summary:     { content: uploadSummaryContent,    badge: summaryBadge,    get: () => summaryMd,     set: v => summaryMd = v },
                                key_points:  { content: uploadKeyPointsContent,  badge: keyPointsBadge,  get: () => keyPointsMd,   set: v => keyPointsMd = v },

                                quiz:        { content: uploadQuizContent,       badge: quizBadge,       get: () => quizMd,        set: v => quizMd = v },
                                mindmap:     { content: uploadMindmapContent,    badge: mindmapBadge,    get: () => mindmapMd,     set: v => mindmapMd = v },
                                slides:      { content: uploadSlidesContent,     badge: slidesBadge,     get: () => slidesMd,      set: v => slidesMd = v },
                                infographic: { content: uploadInfographicContent, badge: infographicBadge, get: () => infographicMd, set: v => infographicMd = v },

                            const t = tMap[event.analysis] || tMap.summary;

                            t.content.innerHTML = markdownToHtml(t.get());

            btnSummarize.disabled = true;

            summaryStatus.textContent = 'Generation en cours...';

                const resp = await fetch('/api/transcriptions/' + id + '/summarize', { method: 'POST' });
                if (!resp.ok) {
                    const err = await resp.json().catch(() => ({ detail: resp.statusText }));
                    throw new Error(err.detail || resp.statusText);
                }
                const reader = resp.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';
                let fullMd = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop();

                    for (const line of lines) {
                        if (!line.startsWith('data: ')) continue;
                        const jsonStr = line.slice(6).trim();

                        const event = JSON.parse(jsonStr);

        try {

                detailActionsBadge.textContent = existingAct.model_name || 'IA';

    // PDF generation (text only, no timestamps)
    function generatePDF(data) {
        const now = new Date().toLocaleString('fr-FR');
        const title = 'Transcription : ' + (data.fileName || data.filename || 'audio');
        const meta = 'Langue : ' + (data.language || '-') + ' | Duree : ' + formatDuration(data.duration || data.duration_sec || 0) + ' | Date : ' + now;
        const w = window.open('', '_blank');
        w.document.write('<!DOCTYPE html><html><head><meta charset="utf-8">');
        w.document.write('<title>' + escHtml(title) + '</title>');
        w.document.write('<style>body{font-family:"Segoe UI",Arial,sans-serif;max-width:700px;margin:2rem auto;padding:0 1rem;color:#1a1a1a;}');
        w.document.write('h1{font-size:1.4rem;border-bottom:2px solid #3b82f6;padding-bottom:0.5rem;margin-bottom:0.5rem;}');
        w.document.write('.meta{color:#666;font-size:0.85rem;margin-bottom:1.5rem;}');
        w.document.write('.text{line-height:1.8;font-size:1rem;white-space:pre-wrap;}');
        w.document.write('@media print{body{margin:1cm;}}</style></head><body>');
        w.document.write('<h1>' + escHtml(title) + '</h1>');
        w.document.write('<div class="meta">' + escHtml(meta) + '</div>');
        w.document.write('<div class="text">' + escHtml(data.text) + '</div>');
        w.document.write('<script>window.onload=function(){window.print();}<\/script>');
        w.document.write('</body></html>');
        w.document.close();
    }

    // ========================
    // VIEW: Search
    // ========================
    async function renderSearch(container, query) {
        container.innerHTML = `
            <div class="card">
                <label>Recherche</label>
                <div style="display:flex;gap:0.5rem;margin-bottom:1rem;">
                    <input type="text" id="searchInput" value="${escHtml(query)}" placeholder="Rechercher dans les transcriptions..."
                        style="flex:1;background:#0f172a;border:1px solid #334155;border-radius:8px;padding:0.6rem;color:#e2e8f0;font-size:0.9rem;" />
                    <button class="btn" id="btnSearch">Rechercher</button>
                </div>
                <div id="searchResults">
                    ${query ? '<p style="color:#94a3b8;">Recherche en cours...</p>' : '<p style="color:#64748b;">Entrez un terme de recherche.</p>'}
                </div>
            </div>
        `;

        const searchInput = document.getElementById('searchInput');
        const btnSearch = document.getElementById('btnSearch');

        async function doSearch(q) {
            if (!q) return;
            navigate('#/search?q=' + encodeURIComponent(q));
            const resultsEl = document.getElementById('searchResults');
            resultsEl.innerHTML = '<p style="color:#94a3b8;">Recherche en cours...</p>';

            try {
                const data = await api('/api/search?q=' + encodeURIComponent(q));
                if (data.results.length === 0) {
                    resultsEl.innerHTML = '<p style="color:#64748b;">Aucun resultat pour "' + escHtml(q) + '".</p>';
                    return;
                }
                resultsEl.innerHTML = data.results.map(r => {
                    if (r.match_type === 'segment') {
                        return `<div class="search-result" onclick="navigate('#/transcriptions/${r.transcription_id}')">
                            <div class="sr-file">${escHtml(r.filename)}</div>
                            <div class="sr-time">[${formatTime(r.start_ms/1000)} -> ${formatTime(r.end_ms/1000)}]</div>
                            <div class="sr-text">${escHtml(r.text)}</div>
                        </div>`;
                    } else {
                        return `<div class="search-result" onclick="navigate('#/transcriptions/${r.id}')">
                            <div class="sr-file">${escHtml(r.filename)}</div>
                            <div class="sr-time">${formatDate(r.created_at)}</div>
                            <div class="sr-text">Fichier correspondant</div>
                        </div>`;
                    }
                }).join('');
            } catch (e) {
                resultsEl.innerHTML = '<p style="color:#fca5a5;">Erreur : ' + escHtml(e.message) + '</p>';
            }
        }

        btnSearch.addEventListener('click', () => doSearch(searchInput.value.trim()));
        searchInput.addEventListener('keydown', e => {
            if (e.key === 'Enter') doSearch(searchInput.value.trim());
        });

        if (query) doSearch(query);
    }
