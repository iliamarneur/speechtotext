services:
  whisper:
    build:
      context: .
      dockerfile: Dockerfile.cpu
    ports:
      - "8000:8000"
    volumes:
      - whisper-models:/models
      - whisper-data:/data
    environment:
      - WHISPER_MODEL=large-v3
      - DB_PATH=/data/transcriptions.db
      - STORE_AUDIO=false
      - OLLAMA_URL=http://host.docker.internal:11434
      - LLM_MODEL=llama3.2
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

volumes:
  whisper-models:
  whisper-data:
